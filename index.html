<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Pour toi 💖</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: Arial, sans-serif;

    display: flex;
    justify-content: center;
    align-items: center;
    color: white;

    background-image: url("social_-_Whisper_of_the_Heart.jpg");
    background-repeat: no-repeat;
    background-position: center center;
    background-size: cover;

    position: relative;
}

/* couche sombre */
body::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.55);
    z-index: 0;
}

/* carte */
.card {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 30px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 30px rgba(255,0,100,0.3);
    max-width: 500px;
}

/* titre */
h1 {
    color: #ff4d6d;
}

/* bouton */
button {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    background: #ff4d6d;
    color: white;
    font-size: 16px;
    transition: 0.3s;
}

button:hover {
    background: #ff1f4b;
}

/* ❤️ cœurs */
.heart {
    position: absolute;
    color: #ff4d6d;
    font-size: 20px;
    animation: float 6s linear infinite;
    opacity: 0.6;
    z-index: 1;
}

@keyframes float {
    0% {
        transform: translateY(100vh) scale(1);
        opacity: 0;
    }
    50% {
        opacity: 1;
    }
    100% {
        transform: translateY(-10vh) scale(1.5);
        opacity: 0;
    }
}

/* 🌸 fleurs */
.flower {
    position: absolute;
    top: -50px;
    font-size: 20px;
    animation: fall linear infinite;
    opacity: 0.8;
    z-index: 1;
}

@keyframes fall {
    0% {
        transform: translateY(-10vh) rotate(0deg);
        opacity: 0;
    }
    10% {
        opacity: 1;
    }
    100% {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0;
    }
}

/* ✨ particules dorées */
.sparkle {
    position: absolute;
    width: 6px;
    height: 6px;
    background: gold;
    border-radius: 50%;
    box-shadow: 0 0 10px gold;
    animation: sparkleFall linear forwards;
    z-index: 2;
}

@keyframes sparkleFall {
    0% {
        transform: translateY(-10vh) scale(0);
        opacity: 0;
    }
    10% {
        opacity: 1;
        transform: scale(1);
    }
    100% {
        transform: translateY(110vh) scale(0.5);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div class="card">
    <h1>💖 Pour toi ma Gloria 💖</h1>
    <p id="text"></p>

    <button onclick="surprise()">Clique ici</button>
    <button onclick="loveAction()">💌 Je t’aime</button>
</div>

<script>

/* 💬 texte progressif */
const message = " Le monde s’émerveille de sept trésors… mais mon regard n’en reconnaît qu’un seul, toi, ma belle GLORIA. ❤️";
let i = 0;

function typeWriter(){
    if(i < message.length){
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeWriter, 50);
    }
}
typeWriter();

/* ❤️ cœurs */
function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (3 + Math.random() * 3) + "s";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}
setInterval(createHeart, 300);

/* 🌸 fleurs */
function createFlower(){
    const flower = document.createElement("div");
    flower.classList.add("flower");

    const flowers = ["🌸","🌼","🌺","💮","🌷"];
    flower.innerHTML = flowers[Math.floor(Math.random()*flowers.length)];

    flower.style.left = Math.random() * 100 + "vw";
    flower.style.animationDuration = (4 + Math.random() * 4) + "s";
    flower.style.fontSize = (15 + Math.random() * 15) + "px";

    document.body.appendChild(flower);

    setTimeout(() => flower.remove(), 8000);
}
setInterval(createFlower, 200);

/* ✨ particules dorées */
function createSparkle(x, y){
    const sparkle = document.createElement("div");
    sparkle.classList.add("sparkle");

    sparkle.style.left = x + (Math.random()*200 - 100) + "px";
    sparkle.style.top = y + "px";

    sparkle.style.animationDuration = (2 + Math.random() * 3) + "s";

    document.body.appendChild(sparkle);

    setTimeout(() => sparkle.remove(), 4000);
}

/* pluie dorée automatique */
setInterval(() => {
    const x = Math.random() * window.innerWidth;
    createSparkle(x, -20);
}, 120);

/* 💌 bouton je t’aime */
function loveAction(){
    alert("💖 Moi aussi, tu es spéciale pour moi 💖");

    for(let i = 0; i < 15; i++){
        createSparkle(window.innerWidth/2, window.innerHeight/2);
    }
}

/* bouton surprise */
function surprise(){
    alert("💖 Tu es quelqu’un d’unique pour moi 💖, Ton homme Pierre");
}

</script>

</body>
</html>
